<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
    <link rel="stylesheet" href="stylos/style.css">
    <link rel="stylesheet" href="stylos/media.css">
</head>

<body>

    <main>
        <section id="login">
            <div id="imagen">
                
            </div>

            <div id="formulario">
                <h1>Login</h1>
                <p> Seja bem vindo de volta, faça o login para te acessor a sua conta. para poder fazer suas
                    configurações</p>

                <form action="login.php" method="post" autocomplete="on">
                   
                    <div class="campo">
                        <i class="material-symbols-outlined">person</i>
                        <input type="email" name="email" id="imail" placeholder="Email" autocomplete="email" required>
                        <label for="imail"></label>
                    </div>

                    <div class="campo">
                        <i class="material-symbols-outlined">vpn_key</i>
                        <input type="password" name="senha" id="isenha" placeholder="Senha" autocomplete="current-password" required>
                        <label for="isenha"></label>
                    </div>

                    <input type="submit" value="Entrar">

                    <a href="#" class="botao">Esqueci minha senha
                        <i class="material-symbols-outlined">mail</i>
                    </a>
                    
                </form>
            </div>
        </section>
    </main>

</body>

</html>
